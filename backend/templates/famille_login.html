<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GérioTrack — Portail famille</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e17;--bg2:#111827;--bg3:#1a2235;--border:rgba(255,255,255,0.07);--teal:#00d4aa;--teal-dim:rgba(0,212,170,0.10);--red:#ff4d6d;--purple:#a78bfa;--txt:#e2e8f0;--txt2:#94a3b8;--txt3:#475569;--font-head:'Syne',sans-serif;--font-body:'Inter',sans-serif;--font-mono:'IBM Plex Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:var(--font-body);display:flex;align-items:center;justify-content:center;padding:24px;background-image:radial-gradient(ellipse at 20% 20%,rgba(0,212,170,.08),transparent 40%),radial-gradient(ellipse at 80% 80%,rgba(167,139,250,.08),transparent 40%)}
.card{width:min(420px,100%);background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:32px 28px;box-shadow:0 20px 50px rgba(0,0,0,.35)}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.logo-icon{width:40px;height:40px;background:var(--teal);border-radius:10px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:20px;height:20px;stroke:#0a0e17;fill:none;stroke-width:2.2;stroke-linecap:round}
.logo-name{font-family:var(--font-head);font-size:18px;font-weight:700;color:#fff}
.logo-sub{font-size:11px;color:var(--txt3);font-family:var(--font-mono);margin-top:2px}
h1{font-family:var(--font-head);font-size:22px;font-weight:700;color:#fff;margin-bottom:6px}
.lead{font-size:13px;color:var(--txt2);line-height:1.5;margin-bottom:22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;color:var(--txt3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.field input,.field select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 12px;color:var(--txt);font-size:14px;outline:none}
.field input:focus,.field select:focus{border-color:rgba(0,212,170,.4)}
.field select option{background:var(--bg2)}
.btn{width:100%;margin-top:8px;padding:12px;border:none;border-radius:10px;background:var(--teal);color:#0a0e17;font-family:var(--font-head);font-weight:700;font-size:14px;cursor:pointer}
.btn:hover{background:#00ebb9}
.hint{margin-top:18px;padding:12px;background:var(--teal-dim);border:1px solid rgba(0,212,170,.2);border-radius:10px;font-size:11px;color:var(--txt2);font-family:var(--font-mono);line-height:1.5}
.hint strong{color:var(--teal)}
.err{display:none;margin-top:10px;color:var(--red);font-size:12px;font-family:var(--font-mono)}
.back{display:block;text-align:center;margin-top:16px;font-size:12px;color:var(--txt3);text-decoration:none;font-family:var(--font-mono)}
.back:hover{color:var(--teal)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>
    <div><div class="logo-name">GérioTrack</div><div class="logo-sub">Portail famille · Kinshasa</div></div>
  </div>
  <h1>Connexion famille</h1>
  <p class="lead">Suivez l’état de santé de votre proche, recevez les alertes et contactez l’équipe médicale.</p>
  <form id="loginForm" onsubmit="return doLogin(event)">
    <div class="field">
      <label for="profil">Profil famille (démo)</label>
      <select id="profil">
        <option value="F001">Marie Dupont — proche de Jean Dupont</option>
        <option value="F002">Paul Martin — proche de Marie Martin</option>
        <option value="F003">Julie Simon — proche d’André Simon</option>
      </select>
    </div>
    <div class="field">
      <label for="code">Code d’accès</label>
      <input id="code" type="password" placeholder="famille123" value="famille123" required>
    </div>
    <button class="btn" type="submit">Entrer dans mon espace</button>
    <div class="err" id="err">Code incorrect. Essayez : famille123</div>
  </form>
  <div class="hint">Démo simulation — code : <strong>famille123</strong><br>Aucun compte réel requis pour l’instant.</div>
  <a class="back" href="/">← Retour espace médecin</a>
</div>
<script>
function doLogin(e){
  e.preventDefault();
  const code=document.getElementById('code').value.trim();
  if(code!=='famille123'){
    document.getElementById('err').style.display='block';
    return false;
  }
  const profil=document.getElementById('profil').value;
  sessionStorage.setItem('gerio_famille', profil);
  window.location.href='/famille/espace/';
  return false;
}
</script>
</body>
</html>
