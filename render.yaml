# Déploiement Render — GérioTrack (racine du dépôt)
# Blueprint Path : laisser vide ou render.yaml

databases:
  - name: geriotrack-db
    plan: free
    databaseName: geriotrack
    user: geriotrack

services:
  - type: web
    name: geriotrack
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: './build.sh'
    startCommand: 'gunicorn geriatrie_iot.wsgi:application --bind 0.0.0.0:$PORT'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: geriotrack-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: 'false'
      - key: PYTHON_VERSION
        value: '3.10.11'
      - key: PUBLIC_BASE_URL
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_HOST_USER
        value: mbayisoleil10@gmail.com
      - key: FAMILY_ALERT_EMAIL
        value: mbayisoleil10@gmail.com
